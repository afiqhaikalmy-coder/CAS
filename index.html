        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; justify-content: center; align-items: flex-end; backdrop-filter: blur(3px); }

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx1eU7ObJu1_xhNizPmUP4_jSESc3bqfhoVLBogao6tT8QmFmYF2xFXOhqMUuErYzqd/exec"; 
        let vendors = []; 
        let ads = [];
        let currentSlide = 0;
        let slideInterval;
        const container = document.getElementById('vendor-grid-container');

        // --- DATA LOKASI MALAYSIA ---
        const malaysiaLocations = {
            "Johor": ["Johor Bahru", "Kulai", "Batu Pahat", "Muar", "Kluang", "Segamat", "Pontian", "Kota Tinggi", "Mersing", "Tangkak"],
            "Selangor": ["Shah Alam", "Petaling Jaya", "Klang", "Subang Jaya", "Kajang", "Gombak", "Hulu Langat", "Sepang", "Kuala Langat", "Kuala Selangor"],
            "Kuala Lumpur": ["Kuala Lumpur", "Cheras", "Setapak", "Kepong", "Bangsar", "Wangsa Maju"],
            "Pulau Pinang": ["Georgetown", "Bayan Lepas", "Butterworth", "Bukit Mertajam", "Nibong Tebal"],
            "Perak": ["Ipoh", "Taiping", "Manjung", "Teluk Intan", "Kuala Kangsar"],
            "Melaka": ["Melaka Tengah", "Alor Gajah", "Jasin"],
            "Negeri Sembilan": ["Seremban", "Port Dickson", "Nilai"],
            "Kedah": ["Alor Setar", "Sungai Petani", "Kulim", "Langkawi"],
            "Pahang": ["Kuantan", "Temerloh", "Bentong", "Cameron Highlands"],
            "Terengganu": ["Kuala Terengganu", "Kemaman", "Dungun"],
            "Kelantan": ["Kota Bharu", "Pasir Mas", "Tanah Merah"],
            "Sabah": ["Kota Kinabalu", "Sandakan", "Tawau"],
            "Sarawak": ["Kuching", "Miri", "Sibu", "Bintulu"],
            "Putrajaya": ["Putrajaya"]
        };

        window.onload = function() {
            fetchData();
            initLocationFilter();
        };

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Network response");
                const data = await response.json();
                
                vendors = data.vendors || [];
                vendors = vendors.map(v => ({
                    ...v,
                    priceHTML: generatePriceHTML(v.prices)
                }));
                
                if(data.ads && data.ads.length > 0) {
                    ads = data.ads;
                }
                initSlider(); 
                renderVendors();
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `<div class="loader-container"><p>Gagal memuatkan data. Sila refresh.</p></div>`;
            }
        }

        // --- SLIDER LOGIC ---
        function initSlider() {
            const sliderContainer = document.getElementById('heroSlider');
            const dotsContainer = document.getElementById('sliderDots');
            sliderContainer.innerHTML = '';
            dotsContainer.innerHTML = '';

            const prevBtn = document.createElement('button');
            prevBtn.className = 'slider-arrow prev-btn';
            prevBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
            prevBtn.onclick = () => moveSlide(-1);

            const nextBtn = document.createElement('button');
            nextBtn.className = 'slider-arrow next-btn';
            nextBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
            nextBtn.onclick = () => moveSlide(1);

            sliderContainer.appendChild(prevBtn);
            sliderContainer.appendChild(nextBtn);

            let slideContent = [];
            // Default Slide
            slideContent.push({
                image: 'https://arleta.site/interactivelink/3412/IMG-20260207-WA0000.jpg',
                title: 'Selamat Datang ke CAS',
                subtitle: 'Platform Komuniti Bisnes Lokal',
                link: null
            });

            if(ads.length > 0) {
                ads.forEach(ad => {
                    slideContent.push({
                        image: ad.image || 'https://via.placeholder.com/800x400?text=Iklan',
                        title: ad.title || '',
                        subtitle: ad.subtitle || '',
                        link: ad.link
                    });
                });
            }

            slideContent.forEach((item, index) => {
                const slide = document.createElement('div');
                slide.className = `slide ${index === 0 ? 'active' : ''}`;
                slide.style.backgroundImage = `url('${item.image}')`;
                
                if(item.link) {
                    slide.style.cursor = 'pointer';
                    slide.onclick = () => window.open(item.link, '_blank');
                }

                slide.innerHTML = `
                    <div class="slide-content">
                        ${item.title ? `<div class="slide-title">${item.title}</div>` : ''}
                        ${item.subtitle ? `<div class="slide-sub">${item.subtitle}</div>` : ''}
                    </div>
                `;
                sliderContainer.appendChild(slide);

                const dot = document.createElement('div');
                dot.className = `dot ${index === 0 ? 'active' : ''}`;
                dotsContainer.appendChild(dot);
            });

            if(slideContent.length > 1) {
                startAutoSlide();
            }
        }

        function moveSlide(step) {
            const slides = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.dot');
            if (slides.length <= 1) return;

            slides[currentSlide].classList.remove('active');
            if(dots[currentSlide]) dots[currentSlide].classList.remove('active');

            currentSlide = (currentSlide + step + slides.length) % slides.length;

            slides[currentSlide].classList.add('active');
            if(dots[currentSlide]) dots[currentSlide].classList.add('active');

            startAutoSlide(); 
        }

        function startAutoSlide() {
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                moveSlide(1);
            }, 4000); 
        }

        // --- FILTER & RENDER ---
        let activeCategory = 'all';

        function renderVendors() {
            container.innerHTML = '';
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            const stateVal = document.getElementById('stateSelect').value;
            const distVal = document.getElementById('districtSelect').value;

            const filtered = vendors.filter(v => {
                const matchCat = activeCategory === 'all' || 
                                 (v.category && v.category.toLowerCase().includes(activeCategory.toLowerCase()));
                
                const textData = `${v.name} ${v.desc} ${v.location} ${v.category} ${Array.isArray(v.tags) ? v.tags.join(' ') : ''}`.toLowerCase();
                const matchSearch = textData.includes(searchVal);

                const vendorLoc = (v.location || '').toLowerCase();
                const matchState = stateVal === '' || vendorLoc.includes(stateVal.toLowerCase());
                const matchDist = distVal === '' || vendorLoc.includes(distVal.toLowerCase());

                return matchCat && matchSearch && matchState && matchDist;
            });

            if(filtered.length === 0) {
                container.innerHTML = `<div class="loader-container"><p>Tiada data dijumpai.</p></div>`;
                return;
            }

            filtered.forEach(v => {
                const card = document.createElement('div');
                card.className = 'v-card';
                card.onclick = () => openDetailModal(v.id);
                const thumbImg = v.thumb ? v.thumb : 'https://via.placeholder.com/300?text=No+Image';
                const shortDesc = v.desc ? v.desc.replace(/<[^>]*>?/gm, '').substring(0, 30) + '...' : 'Klik untuk info';

                card.innerHTML = `
                    <div class="v-img-wrap">
                        <img src="${thumbImg}" class="v-img" loading="lazy" onerror="this.src='https://via.placeholder.com/300?text=Error'">
                        <span class="v-badge">${v.category || 'Umum'}</span>
                    </div>
                    <div class="v-info">
                        <div class="v-name">${v.name}</div>
                        <div class="v-desc-mini">${shortDesc}</div>
                        <div class="v-footer">
                            <span class="v-btn">Lihat Info</span>
                            <span class="v-loc"><i class="fas fa-map-marker-alt"></i> ${v.location ? v.location.split(',')[0] : 'Lokal'}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- FILTER UI FUNCTIONS ---
        function toggleFilterPanel() {
            const panel = document.getElementById('filterPanel');
            const btn = document.querySelector('.filter-toggle-btn');
            panel.classList.toggle('show');
            btn.classList.toggle('active');
        }

        function initLocationFilter() {
            const stateSelect = document.getElementById('stateSelect');
            const states = Object.keys(malaysiaLocations).sort();
            states.forEach(state => {
                const option = document.createElement('option');
                option.value = state;
                option.textContent = state;
                stateSelect.appendChild(option);
            });
        }

        function populateDistricts() {
            const stateSelect = document.getElementById('stateSelect');
            const districtSelect = document.getElementById('districtSelect');
            const selectedState = stateSelect.value;

            districtSelect.innerHTML = '<option value="">Semua Daerah</option>';
            districtSelect.disabled = true;

            if (selectedState && malaysiaLocations[selectedState]) {
                const districts = malaysiaLocations[selectedState].sort();
                districts.forEach(dist => {
                    const option = document.createElement('option');
                    option.value = dist;
                    option.textContent = dist;
                    districtSelect.appendChild(option);
                });
                districtSelect.disabled = false;
            }
            renderVendors();
        }

        document.getElementById('districtSelect').addEventListener('change', renderVendors);

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('stateSelect').value = '';
            document.getElementById('districtSelect').innerHTML = '<option value="">Semua Daerah</option>';
            document.getElementById('districtSelect').disabled = true;
            activeCategory = 'all';
            document.querySelectorAll('.cat-pill').forEach(el => el.classList.remove('active'));
            document.querySelector('.cat-pill:first-child').classList.add('active');
            renderVendors();
        }

        function filterCategory(cat, element) {
            document.querySelectorAll('.cat-pill').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');
            activeCategory = cat;
            renderVendors();
        }

        function performSearch() {
            renderVendors();
        }
        
        document.getElementById('searchInput').addEventListener("keypress", function(event) {
            if (event.key === "Enter") performSearch();
        });

        // --- MODALS ---
        function generatePriceHTML(prices) {
            if (!prices || prices.length === 0) return '<p style="font-size:0.9rem; color:#64748b;">Hubungi untuk info lanjut.</p>';
            let listItems = prices.map(p => {
                if (!p.item) return ''; 
                return `<li><span>${p.item}</span> <strong>${p.price}</strong></li>`;
            }).join('');
            return `<div class="m-price-list"><ul>${listItems}</ul></div>`;
        }

        function openDetailModal(id) {
            const v = vendors.find(item => item.id === id);
            if(!v) return;

            // --- BAHAGIAN BARU UNTUK GALERI (GAMBAR & VIDEO) ---
            let imgsHTML = '';
            if (v.images && v.images.length > 0) {
                const mediaList = v.images.map(src => {
                    src = src.trim(); // Buang jarak kosong jika ada
                    // 1. Cek jika YouTube
                    if (src.includes('youtube.com/watch') || src.includes('youtu.be/')) {
                        let ytId = '';
                        if (src.includes('youtu.be/')) {
                            ytId = src.split('youtu.be/')[1].split('?')[0];
                        } else {
                            let urlParams = new URLSearchParams(src.split('?')[1]);
                            ytId = urlParams.get('v') || src.split('v=')[1].split('&')[0];
                        }
                        return `<iframe class="gallery-img-item" src="https://www.youtube.com/embed/${ytId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                    } 
                    // 2. Cek jika MP4 / WebM
                    else if (src.toLowerCase().includes('.mp4') || src.toLowerCase().includes('.webm')) {
                        return `<video class="gallery-img-item" controls playsinline preload="metadata">
                                    <source src="${src}" type="video/mp4">
                                </video>`;
                    } 
                    // 3. Gambar Biasa
                    else {
                        return `<img src="${src}" class="gallery-img-item" loading="lazy" onclick="window.open('${src}', '_blank')">`;
                    }
                }).join('');
                
                // Bungkus semua dalam kotak scroll
                imgsHTML = `<div class="gallery-scroll-box">${mediaList}</div>`;
            }

            let socialsHTML = '';
            if (v.socials && v.socials.length > 0) {
                socialsHTML = v.socials.map(s => `
                    <a href="${s.link}" target="_blank" style="color:var(--primary); font-weight:600; text-decoration:underline; display:block; margin-bottom:5px;">
                        <i class="fas fa-link"></i> Link Media Sosial
                    </a>
                `).join('');
            }

            const content = `
                <img src="${v.thumb || 'https://via.placeholder.com/600x400'}" class="m-header-img">
                <div class="m-body">
                    <span class="m-cat">${v.category}</span>
                    <h2 class="m-title">${v.name}</h2>
                    <div style="font-size:0.9rem; color:#64748b; margin-bottom:15px;"><i class="fas fa-map-marker-alt"></i> ${v.location}</div>
                    
                    <div class="m-desc">${v.desc || ''}</div>
                    
                    ${socialsHTML ? `<div style="margin-bottom:20px;">${socialsHTML}</div>` : ''}

                    <div class="m-price-box">
                        <div class="m-price-title">SENARAI HARGA / PAKEJ</div>
                        ${v.priceHTML}
                    </div>

                    ${imgsHTML ? `<div style="margin-top:20px;"><strong>Galeri:</strong><br>${imgsHTML}</div>` : ''}
                </div>
                
                <div class="m-actions">
                    <a href="${v.maps}" target="_blank" class="btn-act btn-loc"><i class="fas fa-map-marker-alt"></i></a>
                    <a href="https://wa.me/${v.whatsapp}?text=Hi%20saya%20berminat%20dengan%20produk%20di%20CAS" target="_blank" class="btn-act btn-wa">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </a>
                </div>
            `;
            document.getElementById('vendorDetailContainer').innerHTML = content;
            document.getElementById('vendorDetailModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDetailModal() { 
            document.getElementById('vendorDetailModal').classList.remove('active'); 
            document.body.style.overflow = 'auto';
        }
        function openRegisterModal() { document.getElementById('registerModal').classList.add('active'); }
        function closeRegisterModal() { document.getElementById('registerModal').classList.remove('active'); }

        window.onclick = function(e) {
            if(e.target.classList.contains('modal-overlay')) {
                e.target.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }

        document.getElementById('daftarForm').addEventListener('submit', (e) => {
            e.preventDefault();
            let name = document.getElementById('regName').value;
            let biz = document.getElementById('regBiz').value;
            let cat = document.getElementById('regCat').value;
            let msg = `Hi Admin CAS, saya ${name} berminat nak daftar bisnes ${biz} dalam kategori ${cat}.`;
            window.open(`https://wa.me/60136072713?text=${encodeURIComponent(msg)}`, '_blank');
        });
    </script>
</body>
</html>
